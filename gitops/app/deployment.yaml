apiVersion: apps/v1
kind: Deployment
metadata:
  name: kpr-web
  namespace: kpr-analytics
  labels:
    app: kpr-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kpr-web
  template:
    metadata:
      labels:
        app: kpr-web
    spec:
      containers:
        - name: kpr-web
          image: danik777/kpr-web:latest
          ports:
            - containerPort: 5000
          env:
            - name: FLASK_ENV
              value: "production"
            - name: DB_PATH
              value: "/db/analytics.db"
            - name: REPORTS_DIR
              value: "/reports"
            - name: PLOTS_DIR
              value: "/plots"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: db-data
              mountPath: /db
              readOnly: true
            - name: reports-data
              mountPath: /reports
              readOnly: true
            - name: plots-data
              mountPath: /plots
              readOnly: true
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: db-data
        - name: reports-data
          persistentVolumeClaim:
            claimName: reports-data
        - name: plots-data
          persistentVolumeClaim:
            claimName: plots-data
