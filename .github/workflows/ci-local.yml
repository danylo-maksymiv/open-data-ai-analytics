name: "Self-Hosted CI Test"

on:
  workflow_dispatch: 

jobs:
  local-run:
    runs-on: self-hosted 

    steps:
      - name: "Downloading code"
        uses: actions/checkout@v4

      - name: "Setup environment and Run"
        run: |
          python3.11 -m venv runner_env
          
          source runner_env/bin/activate
          
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
          cd src
          python data_load.py
          python data_quality.py

      - name: "Uploading Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: local-results
          path: data/processed/
