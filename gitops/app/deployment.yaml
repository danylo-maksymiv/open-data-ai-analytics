apiVersion: apps/v1
kind: Deployment
metadata:
  name: kpr-web
  namespace: kpr-analytics
  labels:
    app: kpr-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kpr-web
  template:
    metadata:
      labels:
        app: kpr-web
    spec:
      containers:
        - name: kpr-web
          image: danylo-maksymiv/kpr-web:latest
          ports:
            - containerPort: 5000
          env:
            - name: FLASK_ENV
              value: "production"
            - name: APP_VERSION
              value: "1.0.0"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"