name: kpr-analytics

networks:
  analytics-net:
    driver: bridge

volumes:
  db-data:
  reports-data:
  plots-data:

services:
  data_load:
    build:
      context: ./data_load
      dockerfile: Dockerfile
    container_name: kpr-data-load
    env_file: .env
    environment:
      - CSV_PATH=/tmp/kontrolno-perevirochna-robota.csv
      - DB_PATH=/db/analytics.db
    volumes:
      - db-data:/db
    networks:
      - analytics-net
    restart: "no"

  data_quality:
    build:
      context: ./data_quality
      dockerfile: Dockerfile
    container_name: kpr-quality
    env_file: .env
    environment:
      - DB_PATH=/db/analytics.db
      - REPORT_PATH=/reports/quality_report.json
    volumes:
      - db-data:/db
      - reports-data:/reports
    networks:
      - analytics-net
    depends_on:
      data_load:
        condition: service_completed_successfully
    restart: "no"


  data_research:
    build:
      context: ./data_research
      dockerfile: Dockerfile
    container_name: kpr-research
    env_file: .env
    environment:
      - DB_PATH=/db/analytics.db
      - REPORT_PATH=/reports/research_report.json
    volumes:
      - db-data:/db:ro
      - reports-data:/reports
    networks:
      - analytics-net
    depends_on:
      data_quality:
        condition: service_completed_successfully
    restart: "no"


  visualization:
    build:
      context: ./visualization
      dockerfile: Dockerfile
    container_name: kpr-visualization
    env_file: .env
    environment:
      - DB_PATH=/db/analytics.db
      - PLOTS_DIR=/plots
    volumes:
      - db-data:/db:ro
      - plots-data:/plots
    networks:
      - analytics-net
    depends_on:
      data_quality:
        condition: service_completed_successfully
    restart: "no"


  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: kpr-web
    env_file: .env
    environment:
      - DB_PATH=/db/analytics.db
      - REPORTS_DIR=/reports
      - PLOTS_DIR=/plots
      - FLASK_ENV=production
    volumes:
      - db-data:/db:ro
      - reports-data:/reports:ro
      - plots-data:/plots:ro
    ports:
      - "5050:5000"
    networks:
      - analytics-net
    depends_on:
      data_research:
        condition: service_completed_successfully
      visualization:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.0
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped